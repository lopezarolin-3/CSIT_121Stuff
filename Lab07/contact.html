<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
    <a href="tierlist.html">Tier List</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <h1>Feedback Form</h1>

    <form>

        <label for="fullname"><b>Full Name:</b></label>
        <input type="text" id="fullname" name="fullname" required>

        <label for="useremail"><b>Email Address:</b></label>
        <input type="email" id="useremail" name="useremail" required>

        <label for="favoriteGame">Favorite Game:</label>
        <select id="favoriteGame" name="favoriteGame">
            <option value="zelda">Zelda</option>
            <option value="zelda">Call of Duty</option>
            <option value="fortnite">Fortnite</option>
            <option value="minecraft">Minecraft</option>
            <option value="minecraft">Amoung Us</option>
        </select>

        <fieldset>
            <legend>Hours Played</legend>
            <label><input type="radio" name="hours" value="beginner"> Beginner 0-20hrs</label>
            <label><input type="radio" name="hours" value="intermediate"> 100-500hrs</label>
            <label><input type="radio" name="hours" value="advanced"> 500+hrs</label>
        </fieldset>

        <fieldset>
            <legend>Skill Level</legend>
            <label><input type="radio" name="skill" value="beginner"> Beginner</label>
            <label><input type="radio" name="skill" value="intermediate"> Intermediate</label>
            <label><input type="radio" name="skill" value="advanced"> Advanced</label>
        </fieldset>

        <fieldset>
            <legend>Platforms You Use</legend>
            <label><input type="checkbox" name="platform" value="pc"> PC</label>
            <label><input type="checkbox" name="platform" value="console"> Console</label>
            <label><input type="checkbox" name="platform" value="mobile"> Mobile</label>
        </fieldset>

        <label for="feedback">Your Feedback on my Tier-List:</label>
        <textarea id="feedback" name="feedback" rows="4"></textarea>

        <button type="submit">Send</button>

    </form>
</div>

<footer>
    &copy; 2026 Rolin Lopez. All rights reserved.
</footer>

</body>
</html>
