<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Image</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: black;
      color: white;
      flex-direction: column;
    }

    img {
      max-width: 80%;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    a {
      margin-top: 20px;
      color: white;
      text-decoration: none;
      background: rgb(70, 70, 70);
      padding: 10px 16px;
      border-radius: 8px;
    }
      .homepage {
        font-size: 35px;
      position: fixed;
      bottom: 200px;
      right: 350px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 12px 18px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
    }
  </style>
</head>
<body>
  <h1>Character Spreadsheet</h1>
  <img src="Images/zorya3.jpg">
